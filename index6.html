<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會議時間調查工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .time-slot { height: 30px; user-select: none; transition: background-color 0.1s; }
        .slot-selected { background-color: #3b82f6 !important; border-color: #2563eb; } /* Blue-500 */
        .slot-other { background-color: rgba(34, 197, 94, var(--opacity)) !important; } /* Green-500 */
        .grid-container {
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
        }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <!-- 載入中遮罩 -->
    <div id="loading" class="loading-overlay hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-blue-600 mb-4"></div>
        <p class="text-blue-600 font-medium">與 Google 伺服器同步中...</p>
    </div>

    <div id="app" class="max-w-7xl mx-auto p-4 md:p-8">
        
        <!-- 第 1 階段：身分登入 -->
        <div id="step-1" class="flex flex-col items-center justify-center min-h-[70vh]">
            <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-extrabold text-gray-900 mb-2">會議時間調查</h1>
                    <p class="text-gray-500">請輸入資訊以開始或修改您的時間</p>
                </div>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">您的姓名</label>
                        <input type="text" id="username" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="例如：王小明">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">自訂密碼</label>
                        <input type="password" id="password" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="用於日後修改資料">
                    </div>
                    <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 active:scale-95 transition transform duration-150 shadow-lg shadow-blue-200">
                        進入時間表
                    </button>
                    <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
                        <p class="text-xs text-blue-700 leading-relaxed">
                            💡 提示：若您之前已填寫過，請輸入相同的姓名與密碼，系統將自動載入您的舊記錄。
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 第 2 階段：主操作畫面 -->
        <div id="step-2" class="hidden animate-fade-in">
            <header class="bg-white p-6 rounded-2xl shadow-sm mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border border-gray-100">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">哈囉，<span id="display-name" class="text-blue-600"></span></h2>
                    <p class="text-gray-500 mt-1 italic">請在下方左側網格「點擊」或「拖曳」來圈選您的方便時間</p>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="saveData()" class="bg-green-600 text-white font-bold px-8 py-3 rounded-xl hover:bg-green-700 shadow-md shadow-green-100 transition">
                        儲存並提交
                    </button>
                    <button onclick="location.reload()" class="bg-white text-gray-500 border border-gray-200 px-4 py-3 rounded-xl hover:bg-gray-50 transition">登出</button>
                </div>
            </header>

            <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                <!-- 左側：個人編輯區 -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-6 bg-blue-600 rounded-full"></span>
                            <h3 class="font-bold text-lg text-gray-800">我的方便時間</h3>
                        </div>
                        <button onclick="clearSelections()" class="text-sm text-red-500 font-medium hover:bg-red-50 px-2 py-1 rounded transition">全部清空</button>
                    </div>
                    <div id="my-grid-container" class="grid-container border border-gray-200 rounded-md overflow-hidden bg-white">
                        <!-- 由 JS 生成 -->
                    </div>
                </div>

                <!-- 右側：群體熱點圖 -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-6 bg-green-500 rounded-full"></span>
                            <h3 class="font-bold text-lg text-gray-800">大家的時間熱點</h3>
                        </div>
                        <span id="total-users-label" class="text-sm font-bold text-green-600 bg-green-50 px-3 py-1 rounded-full">目前參與：0 人</span>
                    </div>
                    <div id="others-grid-container" class="grid-container border border-gray-200 rounded-md overflow-hidden bg-white">
                        <!-- 由 JS 生成 -->
                    </div>
                    <div class="mt-6 p-4 bg-gray-50 rounded-xl border border-gray-100 flex flex-wrap items-center gap-4 text-xs text-gray-600">
                        <span class="font-medium">顏色深淺說明：</span>
                        <div class="flex items-center gap-1"><div class="w-4 h-4 bg-white border border-gray-300"></div> 0人</div>
                        <div class="flex items-center gap-1"><div class="w-4 h-4 bg-green-100"></div> 較少人</div>
                        <div class="flex items-center gap-1"><div class="w-4 h-4 bg-green-400"></div> 中等</div>
                        <div class="flex items-center gap-1"><div class="w-4 h-4 bg-green-700"></div> 多數人</div>
                        <div class="flex items-center gap-1"><div class="w-4 h-4 bg-green-900"></div> 全員有空</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 訊息彈窗 -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl hidden transform transition-all duration-300"></div>

    <script>
        // --- 設定區 ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbxBwYgFLEQ0CHLWQseM8U4Dg0uBQC-2DCXN-93D0Yr7Hv9Suqe6eTvt8qGIjU5xi4SXDQ/exec';
        const START_HOUR = 7;
        const END_HOUR = 19;
        const HOURS = Array.from({ length: END_HOUR - START_HOUR + 1 }, (_, i) => START_HOUR + i);
        
        let mySelections = new Set();
        let heatmapData = {}; 
        let totalUsers = 0;
        let isMouseDown = false;
        let isAdding = true;

        // 計算本週日期 (週一至週日)
        const getWeekDates = () => {
            const now = new Date();
            const day = now.getDay(); 
            const diff = now.getDate() - (day === 0 ? 6 : day - 1); 
            const monday = new Date(now.setDate(diff));
            return Array.from({ length: 7 }, (_, i) => {
                const date = new Date(monday);
                date.setDate(monday.getDate() + i);
                return date.toISOString().split('T')[0];
            });
        };

        const weekDates = getWeekDates();

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
        }

        function showMessage(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // 登入驗證
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) return showMessage('❌ 請填寫姓名與密碼');

            showLoading(true);
            try {
                // 呼叫 GAS 進行登入
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 處理 CORS 的一種簡易方式，但我們在 GAS 已經處理過，建議直接 fetch
                });
                
                // 注意：fetch 到 GAS 可能需要遵循其 redirect 機制
                // 這裡使用更保險的請求方式
                const loginResp = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', username, password })
                });
                const result = await loginResp.json();

                if (result.success) {
                    mySelections = new Set(result.availability || []);
                    document.getElementById('display-name').innerText = username;
                    
                    // 取得統計資料
                    await refreshHeatmap();
                    
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                    initGrids();
                } else {
                    showMessage('❌ ' + (result.message || '登入失敗'));
                }
            } catch (err) {
                console.error(err);
                showMessage('⚠️ 連線異常，請確認 GAS 網址是否正確部署');
            } finally {
                showLoading(false);
            }
        }

        // 儲存資料
        async function saveData() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            showLoading(true);
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'save',
                        username,
                        password,
                        availability: Array.from(mySelections)
                    })
                });
                const result = await response.json();
                if (result.success) {
                    showMessage('✅ 資料儲存成功！');
                    await refreshHeatmap();
                } else {
                    showMessage('❌ 儲存失敗：' + result.message);
                }
            } catch (err) {
                showMessage('⚠️ 儲存發生錯誤');
            } finally {
                showLoading(false);
            }
        }

        async function refreshHeatmap() {
            const resp = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getAll' })
            });
            const result = await resp.json();
            heatmapData = result.heatmap || {};
            totalUsers = result.totalUsers || 0;
            document.getElementById('total-users-label').innerText = `目前參與：${totalUsers} 人`;
            if (document.getElementById('step-2').offsetParent !== null) {
                renderGrid('others-grid-container', false);
            }
        }

        function initGrids() {
            renderGrid('my-grid-container', true);
            renderGrid('others-grid-container', false);
        }

        function renderGrid(containerId, interactive) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            // Header Row
            container.appendChild(createCell('時間', 'bg-gray-50 border-b border-r text-gray-400 text-[10px] font-bold'));
            weekDates.forEach(date => {
                const d = new Date(date);
                const dayLabel = ['日','一','二','三','四','五','六'][d.getDay()];
                const label = `${d.getDate()}\n(${dayLabel})`;
                container.appendChild(createCell(label, 'bg-gray-50 border-b border-r text-[11px] text-center font-bold text-gray-700 whitespace-pre'));
            });

            // Time Body
            HOURS.forEach(hour => {
                const timeStr = `${hour.toString().padStart(2, '0')}:00`;
                container.appendChild(createCell(timeStr, 'text-[10px] text-right pr-2 border-b border-r bg-gray-50 text-gray-500 font-medium'));

                weekDates.forEach(date => {
                    const slotId = `${date}_${timeStr}`;
                    const cell = document.createElement('div');
                    cell.className = `time-slot border-b border-r cursor-pointer bg-white`;
                    cell.dataset.id = slotId;

                    if (interactive) {
                        if (mySelections.has(slotId)) cell.classList.add('slot-selected');
                        cell.addEventListener('mousedown', (e) => startSelect(e, slotId));
                        cell.addEventListener('mouseover', () => handleMouseOver(slotId));
                    } else {
                        const count = heatmapData[slotId] || 0;
                        if (count > 0 && totalUsers > 0) {
                            const opacity = Math.min(count / totalUsers, 1);
                            cell.style.setProperty('--opacity', opacity);
                            cell.classList.add('slot-other');
                            cell.title = `${count} 人有空`;
                        }
                    }
                    container.appendChild(cell);
                });
            });
        }

        function createCell(text, className) {
            const el = document.createElement('div');
            el.className = `h-[30px] flex items-center justify-center ${className}`;
            el.innerText = text;
            return el;
        }

        // --- 滑鼠操作邏輯 ---
        function startSelect(e, id) {
            isMouseDown = true;
            isAdding = !mySelections.has(id);
            toggleSelection(id, e.target);
            
            const upHandler = () => {
                isMouseDown = false;
                window.removeEventListener('mouseup', upHandler);
            };
            window.addEventListener('mouseup', upHandler);
        }

        function handleMouseOver(id) {
            if (!isMouseDown) return;
            const cell = document.querySelector(`#my-grid-container [data-id="${id}"]`);
            if (isAdding && !mySelections.has(id)) {
                toggleSelection(id, cell);
            } else if (!isAdding && mySelections.has(id)) {
                toggleSelection(id, cell);
            }
        }

        function toggleSelection(id, cell) {
            if (mySelections.has(id)) {
                mySelections.delete(id);
                cell.classList.remove('slot-selected');
            } else {
                mySelections.add(id);
                cell.classList.add('slot-selected');
            }
        }

        function clearSelections() {
            mySelections.clear();
            document.querySelectorAll('#my-grid-container .slot-selected').forEach(el => {
                el.classList.remove('slot-selected');
            });
        }
    </script>
</body>
</html>
