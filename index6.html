<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會議時間調查工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .time-slot { height: 32px; user-select: none; transition: background-color 0.1s; border-bottom: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb; }
        .slot-selected { background-color: #3b82f6 !important; border-color: #2563eb; }
        .slot-other { background-color: rgba(34, 197, 94, var(--opacity)) !important; position: relative; }
        
        .grid-container {
            display: grid;
            grid-template-columns: 70px repeat(7, 1fr);
            border-top: 1px solid #e5e7eb;
            border-left: 1px solid #e5e7eb;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        /* Tooltip Style */
        .tooltip {
            visibility: hidden;
            position: absolute;
            z-index: 50;
            background-color: #1f2937;
            color: white;
            text-align: left;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            min-width: 140px;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .slot-other:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">

    <!-- 載入動畫 -->
    <div id="loading" class="loading-overlay hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-blue-600 mb-4"></div>
        <p class="text-blue-600 font-medium">資料傳輸中...</p>
    </div>

    <div id="app" class="max-w-[1600px] mx-auto p-4 md:p-6">
        
        <!-- 第 1 階段：身分登入 -->
        <div id="step-1" class="flex flex-col items-center justify-center min-h-[80vh]">
            <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md border border-gray-200">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-extrabold mb-2 text-blue-600">會議時間調查</h1>
                    <p class="text-gray-500">輸入姓名與密碼進入系統</p>
                </div>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">您的姓名</label>
                        <input type="text" id="username" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="請輸入姓名">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">密碼</label>
                        <input type="password" id="password" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="初次填寫請自訂密碼">
                    </div>
                    <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 active:scale-95 transition shadow-lg shadow-blue-100">
                        進入系統
                    </button>
                    <p class="text-[10px] text-gray-400 text-center">※ 系統將依據姓名判斷新舊用戶，密碼用於日後修改驗證</p>
                </div>
            </div>
        </div>

        <!-- 第 2 階段：主操作畫面 -->
        <div id="step-2" class="hidden">
            <header class="bg-white p-6 rounded-2xl shadow-sm mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border border-gray-100">
                <div>
                    <h2 class="text-xl font-bold">歡迎，<span id="display-name" class="text-blue-600"></span></h2>
                    <div class="flex items-center gap-4 mt-2">
                        <div class="flex items-center bg-gray-100 rounded-lg p-1 border">
                            <button onclick="changeWeek(-1)" class="px-3 py-1 hover:bg-white rounded transition text-xs font-bold">◀ 上一週</button>
                            <span id="week-label" class="px-6 font-bold text-sm text-gray-600">本週</span>
                            <button onclick="changeWeek(1)" class="px-3 py-1 hover:bg-white rounded transition text-xs font-bold">下一週 ▶</button>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="saveData()" class="bg-blue-600 text-white font-bold px-10 py-3 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-100 transition active:scale-95">
                        儲存提交
                    </button>
                    <button onclick="location.reload()" class="bg-white text-gray-400 border border-gray-200 px-4 py-3 rounded-xl hover:bg-gray-50 transition text-sm">登出</button>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <!-- 左側：個人編輯區 (5格) -->
                <div class="lg:col-span-5 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-800 flex items-center gap-2">
                            <span class="w-2 h-4 bg-blue-500 rounded-sm"></span>我的方便時間
                        </h3>
                        <button onclick="clearSelections()" class="text-[10px] text-red-500 hover:bg-red-50 px-2 py-1 rounded border border-red-100">清空本週</button>
                    </div>
                    <div id="my-grid-container" class="grid-container bg-white"></div>
                </div>

                <!-- 中間：熱點圖 (5格) -->
                <div class="lg:col-span-5 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-800 flex items-center gap-2">
                            <span class="w-2 h-4 bg-green-500 rounded-sm"></span>團隊時間熱點
                        </h3>
                        <span id="total-users-label" class="text-xs font-bold text-green-600 bg-green-50 px-3 py-1 rounded-full">參與：0 人</span>
                    </div>
                    <div id="others-grid-container" class="grid-container bg-white"></div>
                </div>

                <!-- 右側：即時名單面板 (2格) -->
                <div class="lg:col-span-2">
                    <div class="sticky top-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 min-h-[450px]">
                        <h3 class="font-bold text-gray-800 mb-4 pb-2 border-b flex items-center gap-2">
                            👤 誰有空？
                        </h3>
                        <div id="info-panel" class="space-y-4">
                            <p class="text-sm text-gray-400 italic">滑鼠移至中間熱點圖格子，這裡會直接顯示名單...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl hidden z-[200] text-sm font-medium"></div>

    <script>
        // 請確保此網址正確且已發佈為「所有人」可存取
        const API_URL = 'https://script.google.com/macros/s/AKfycbxBwYgFLEQ0CHLWQseM8U4Dg0uBQC-2DCXN-93D0Yr7Hv9Suqe6eTvt8qGIjU5xi4SXDQ/exec';
        const START_HOUR = 7;
        const END_HOUR = 19;
        const HOURS = Array.from({ length: END_HOUR - START_HOUR + 1 }, (_, i) => START_HOUR + i);
        
        let mySelections = new Set();
        let heatmapData = {}; 
        let totalUsers = 0;
        let isMouseDown = false;
        let isAdding = true;
        let currentWeekOffset = 0;

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
        }

        function showMessage(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 4000);
        }

        const getWeekDates = (offset = 0) => {
            const now = new Date();
            const day = now.getDay(); 
            const diff = now.getDate() - (day === 0 ? 6 : day - 1) + (offset * 7); 
            const startDay = new Date(now.setDate(diff));
            return Array.from({ length: 7 }, (_, i) => {
                const date = new Date(startDay);
                date.setDate(startDay.getDate() + i);
                return date.toISOString().split('T')[0];
            });
        };

        let weekDates = getWeekDates(0);

        function changeWeek(direction) {
            currentWeekOffset += direction;
            weekDates = getWeekDates(currentWeekOffset);
            document.getElementById('week-label').innerText = currentWeekOffset === 0 ? '本週' : (currentWeekOffset > 0 ? `下 ${currentWeekOffset} 週` : `前 ${Math.abs(currentWeekOffset)} 週`);
            initGrids();
        }

        /**
         * 處理登入邏輯
         */
        async function handleLogin() {
            const usernameField = document.getElementById('username');
            const passwordField = document.getElementById('password');
            const username = usernameField.value.trim();
            const password = passwordField.value.trim();

            if (!username || !password) return showMessage('❌ 請完整填寫姓名與密碼');

            showLoading(true);
            try {
                // 增加 headers 確保跨網域請求 JSON 格式
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 某些環境下需要，但會看不到內容。正常情況應使用預設 cors
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'login', username, password })
                });

                // 注意：GAS POST 請求若跨域，可能需要透過特殊的 API 寫法或使用 GET 跳轉。
                // 這裡採用標準 JSON POST。
                const loginResp = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', username, password })
                });
                const result = await loginResp.json();

                if (result.success) {
                    mySelections = new Set(result.availability || []);
                    document.getElementById('display-name').innerText = username;
                    await refreshHeatmap(false);
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                    initGrids();
                } else {
                    showMessage('❌ ' + (result.message || '驗證失敗，請檢查密碼'));
                }
            } catch (err) {
                console.error(err);
                showMessage('⚠️ 連線失敗。請確認腳本已發佈且允許匿名存取。');
            } finally {
                showLoading(false);
            }
        }

        async function saveData() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            showLoading(true);
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'save',
                        username,
                        password,
                        availability: Array.from(mySelections)
                    })
                });
                const result = await response.json();
                if (result.success) {
                    showMessage('✅ 資料儲存成功！');
                    await refreshHeatmap(true);
                } else {
                    showMessage('❌ ' + result.message);
                }
            } catch (err) {
                showMessage('⚠️ 儲存時發生錯誤');
            } finally {
                showLoading(false);
            }
        }

        async function refreshHeatmap(render = true) {
            try {
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getAll' })
                });
                const result = await resp.json();
                heatmapData = result.heatmap || {};
                totalUsers = result.totalUsers || 0;
                document.getElementById('total-users-label').innerText = `參與：${totalUsers} 人`;
                if (render) renderGrid('others-grid-container', false);
            } catch (e) { console.error("熱點圖讀取失敗", e); }
        }

        function initGrids() {
            renderGrid('my-grid-container', true);
            renderGrid('others-grid-container', false);
        }

        function renderGrid(containerId, interactive) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            // Header
            container.appendChild(createCell('時間', 'bg-gray-100 text-[10px] font-bold text-gray-400'));
            weekDates.forEach(date => {
                const d = new Date(date);
                const dayLabel = ['日','一','二','三','四','五','六'][d.getDay()];
                const label = `${d.getMonth()+1}/${d.getDate()}\n(${dayLabel})`;
                container.appendChild(createCell(label, 'bg-gray-50 text-[11px] text-center font-bold text-gray-600 whitespace-pre'));
            });

            // Grid Rows
            HOURS.forEach(hour => {
                const timeStr = `${hour.toString().padStart(2, '0')}:00`;
                container.appendChild(createCell(timeStr, 'text-[10px] text-right pr-2 bg-gray-50 text-gray-400 font-mono'));

                weekDates.forEach(date => {
                    const slotId = `${date}_${timeStr}`;
                    const cell = document.createElement('div');
                    cell.className = `time-slot cursor-pointer bg-white`;
                    cell.dataset.id = slotId;

                    if (interactive) {
                        if (mySelections.has(slotId)) cell.classList.add('slot-selected');
                        cell.addEventListener('mousedown', (e) => startSelect(e, slotId));
                        cell.addEventListener('mouseover', () => handleMouseOver(slotId));
                    } else {
                        const data = heatmapData[slotId];
                        let count = 0;
                        let names = [];

                        // 判斷資料格式：如果是字串/數字則為人數，如果是陣列則為名單
                        if (Array.isArray(data)) {
                            count = data.length;
                            names = data; // 這裡就是 username 陣列
                        } else if (typeof data === 'number') {
                            count = data;
                        } else if (typeof data === 'string' && !isNaN(data)) {
                            count = parseInt(data);
                        }

                        if (count > 0 && totalUsers > 0) {
                            const opacity = Math.max(0.15, count / totalUsers);
                            cell.style.setProperty('--opacity', opacity);
                            cell.classList.add('slot-other');
                            
                            // 更新名單面板與 Tooltip
                            const showNames = names.length > 0 ? names.join('、') : `${count} 人有空`;
                            
                            cell.addEventListener('mouseenter', () => updateInfoPanel(date, timeStr, names, count));
                            
                            const tooltip = document.createElement('span');
                            tooltip.className = 'tooltip';
                            tooltip.innerText = showNames;
                            cell.appendChild(tooltip);
                        }
                    }
                    container.appendChild(cell);
                });
            });
        }

        function createCell(text, className) {
            const el = document.createElement('div');
            el.className = `h-[32px] flex items-center justify-center border-bottom border-right ${className}`;
            el.style.borderBottom = "1px solid #e5e7eb";
            el.style.borderRight = "1px solid #e5e7eb";
            el.innerText = text;
            return el;
        }

        /**
         * 更新右側「誰有空？」面板
         */
        function updateInfoPanel(date, time, names, count) {
            const panel = document.getElementById('info-panel');
            const d = new Date(date);
            const dateStr = `${d.getMonth()+1}/${d.getDate()} (${['日','一','二','三','四','五','六'][d.getDay()]})`;
            
            let html = `
                <div class="animate-fade-in">
                    <div class="mb-4">
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">所選時段</p>
                        <p class="text-sm font-bold text-blue-600">${dateStr} ${time}</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3">有空名單 (${count}位)</p>
                        <div class="flex flex-wrap gap-2">
            `;

            if (names && names.length > 0) {
                // 如果後端有傳姓名，直接渲染標籤
                names.forEach(name => {
                    html += `<span class="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg text-xs border border-blue-100 font-semibold shadow-sm">${name}</span>`;
                });
            } else if (count > 0) {
                // 如果後端沒傳具體名單，只傳人數
                html += `<p class="text-xs text-gray-500 font-medium bg-gray-50 p-3 rounded-lg border border-dashed border-gray-200 w-full text-center">目前有 ${count} 位夥伴有空</p>`;
            } else {
                html += `<p class="text-xs text-gray-400 italic">該時段目前無人填寫</p>`;
            }

            html += `</div></div></div>`;
            panel.innerHTML = html;
        }

        // --- 滑鼠拖曳選擇邏輯 ---
        function startSelect(e, id) {
            isMouseDown = true;
            isAdding = !mySelections.has(id);
            toggleSelection(id, e.target);
            const upHandler = () => { isMouseDown = false; window.removeEventListener('mouseup', upHandler); };
            window.addEventListener('mouseup', upHandler);
        }

        function handleMouseOver(id) {
            if (!isMouseDown) return;
            const cell = document.querySelector(`#my-grid-container [data-id="${id}"]`);
            if (isAdding && !mySelections.has(id)) toggleSelection(id, cell);
            else if (!isAdding && mySelections.has(id)) toggleSelection(id, cell);
        }

        function toggleSelection(id, cell) {
            if (mySelections.has(id)) {
                mySelections.delete(id);
                cell.classList.remove('slot-selected');
            } else {
                mySelections.add(id);
                cell.classList.add('slot-selected');
            }
        }

        function clearSelections() {
            weekDates.forEach(date => {
                HOURS.forEach(hour => {
                    const id = `${date}_${hour.toString().padStart(2, '0')}:00`;
                    mySelections.delete(id);
                });
            });
            renderGrid('my-grid-container', true);
        }
    </script>
</body>
</html>
