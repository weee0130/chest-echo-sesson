<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會議時間調查工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .time-slot { height: 32px; user-select: none; transition: background-color 0.1s; border-bottom: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb; }
        .slot-selected { background-color: #3b82f6 !important; border-color: #2563eb; }
        .slot-other { background-color: rgba(34, 197, 94, var(--opacity)) !important; position: relative; }
        
        .grid-container {
            display: grid;
            grid-template-columns: 70px repeat(7, 1fr);
            border-top: 1px solid #e5e7eb;
            border-left: 1px solid #e5e7eb;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        /* Tooltip Style */
        .tooltip {
            visibility: hidden;
            position: absolute;
            z-index: 10;
            background-color: #1f2937;
            color: white;
            text-align: center;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 11px;
            white-space: nowrap;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .slot-other:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <div id="loading" class="loading-overlay hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-blue-600 mb-4"></div>
        <p class="text-blue-600 font-medium">與 Google 伺服器同步中...</p>
    </div>

    <div id="app" class="max-w-7xl mx-auto p-4 md:p-8">
        
        <!-- 第 1 階段：身分登入 -->
        <div id="step-1" class="flex flex-col items-center justify-center min-h-[80vh]">
            <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-extrabold text-gray-900 mb-2">會議時間調查</h1>
                    <p class="text-gray-500">請登入以開始或修改您的時間</p>
                </div>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">您的姓名</label>
                        <input type="text" id="username" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例如：王小明">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">自訂密碼</label>
                        <input type="password" id="password" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="修改資料用">
                    </div>
                    <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 active:scale-95 transition shadow-lg shadow-blue-100">
                        進入時間表
                    </button>
                </div>
            </div>
        </div>

        <!-- 第 2 階段：主操作畫面 -->
        <div id="step-2" class="hidden">
            <header class="bg-white p-6 rounded-2xl shadow-sm mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border border-gray-100">
                <div>
                    <h2 class="text-xl font-bold text-gray-800">哈囉，<span id="display-name" class="text-blue-600"></span></h2>
                    <div class="flex items-center gap-4 mt-2">
                        <div class="flex items-center bg-gray-100 rounded-lg p-1">
                            <button onclick="changeWeek(-1)" class="px-3 py-1 hover:bg-white rounded shadow-sm transition">◀ 上一週</button>
                            <span id="week-label" class="px-4 font-bold text-sm text-gray-600">本週</span>
                            <button onclick="changeWeek(1)" class="px-3 py-1 hover:bg-white rounded shadow-sm transition">下一週 ▶</button>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="saveData()" class="bg-green-600 text-white font-bold px-8 py-3 rounded-xl hover:bg-green-700 shadow-md transition">
                        儲存並提交
                    </button>
                    <button onclick="location.reload()" class="bg-white text-gray-400 border border-gray-200 px-4 py-3 rounded-xl hover:bg-gray-50 transition">登出</button>
                </div>
            </header>

            <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                <!-- 左側：個人編輯區 -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-800">🗓️ 我的方便時間</h3>
                        <button onclick="clearSelections()" class="text-xs text-red-500 hover:bg-red-50 px-2 py-1 rounded">清空本週</button>
                    </div>
                    <div id="my-grid-container" class="grid-container bg-white"></div>
                </div>

                <!-- 右側：群體熱點圖 -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-800">🔥 大家的時間熱點</h3>
                        <span id="total-users-label" class="text-xs font-bold text-green-600 bg-green-50 px-3 py-1 rounded-full">參與人數：0</span>
                    </div>
                    <div id="others-grid-container" class="grid-container bg-white"></div>
                    <p class="mt-4 text-[10px] text-gray-400 italic">※ 滑鼠移至綠色區塊可查看具體有哪些人有空</p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl hidden z-[200]"></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxBwYgFLEQ0CHLWQseM8U4Dg0uBQC-2DCXN-93D0Yr7Hv9Suqe6eTvt8qGIjU5xi4SXDQ/exec';
        const START_HOUR = 7;
        const END_HOUR = 19;
        const HOURS = Array.from({ length: END_HOUR - START_HOUR + 1 }, (_, i) => START_HOUR + i);
        
        let mySelections = new Set();
        let heatmapData = {}; // 格式: { slotId: [name1, name2] }
        let totalUsers = 0;
        let isMouseDown = false;
        let isAdding = true;
        let currentWeekOffset = 0;

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
        }

        function showMessage(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // 計算指定週次的日期
        const getWeekDates = (offset = 0) => {
            const now = new Date();
            const day = now.getDay(); 
            const diff = now.getDate() - (day === 0 ? 6 : day - 1) + (offset * 7); 
            const startDay = new Date(now.setDate(diff));
            return Array.from({ length: 7 }, (_, i) => {
                const date = new Date(startDay);
                date.setDate(startDay.getDate() + i);
                return date.toISOString().split('T')[0];
            });
        };

        let weekDates = getWeekDates(0);

        function changeWeek(direction) {
            currentWeekOffset += direction;
            weekDates = getWeekDates(currentWeekOffset);
            document.getElementById('week-label').innerText = currentWeekOffset === 0 ? '本週' : (currentWeekOffset > 0 ? `下 ${currentWeekOffset} 週` : `前 ${Math.abs(currentWeekOffset)} 週`);
            initGrids();
        }

        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) return showMessage('❌ 請填寫姓名與密碼');

            showLoading(true);
            try {
                // 直接發送單次請求，移除錯誤的 no-cors 前置檢查
                const loginResp = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', username, password })
                });
                const result = await loginResp.json();

                if (result.success) {
                    mySelections = new Set(result.availability || []);
                    document.getElementById('display-name').innerText = username;
                    await refreshHeatmap(false);
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                    initGrids();
                } else {
                    showMessage('❌ ' + (result.message || '登入失敗，請檢查帳密'));
                }
            } catch (err) {
                console.error(err);
                showMessage('⚠️ 連線失敗，請檢查網路或 GAS 權限');
            } finally {
                showLoading(false);
            }
        }

        async function saveData() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            showLoading(true);
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'save',
                        username,
                        password,
                        availability: Array.from(mySelections)
                    })
                });
                const result = await response.json();
                if (result.success) {
                    showMessage('✅ 儲存成功！');
                    await refreshHeatmap(true);
                } else {
                    showMessage('❌ ' + result.message);
                }
            } catch (err) {
                showMessage('⚠️ 儲存出錯');
            } finally {
                showLoading(false);
            }
        }

        async function refreshHeatmap(render = true) {
            const resp = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getAll' })
            });
            const result = await resp.json();
            // 預期 heatmap 為 { "date_time": count } 或更新為清單 { "date_time": ["A", "B"] }
            heatmapData = result.heatmap || {};
            totalUsers = result.totalUsers || 0;
            document.getElementById('total-users-label').innerText = `參與人數：${totalUsers}`;
            if (render) renderGrid('others-grid-container', false);
        }

        function initGrids() {
            renderGrid('my-grid-container', true);
            renderGrid('others-grid-container', false);
        }

        function renderGrid(containerId, interactive) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            // Header Row
            container.appendChild(createCell('時間', 'bg-gray-100 text-[10px] font-bold text-gray-400'));
            weekDates.forEach(date => {
                const d = new Date(date);
                const dayLabel = ['日','一','二','三','四','五','六'][d.getDay()];
                const label = `${d.getMonth()+1}/${d.getDate()}\n(${dayLabel})`;
                container.appendChild(createCell(label, 'bg-gray-50 text-[11px] text-center font-bold text-gray-600 whitespace-pre'));
            });

            // Body
            HOURS.forEach(hour => {
                const timeStr = `${hour.toString().padStart(2, '0')}:00`;
                container.appendChild(createCell(timeStr, 'text-[10px] text-right pr-2 bg-gray-50 text-gray-400 font-mono'));

                weekDates.forEach(date => {
                    const slotId = `${date}_${timeStr}`;
                    const cell = document.createElement('div');
                    cell.className = `time-slot cursor-pointer bg-white`;
                    cell.dataset.id = slotId;

                    if (interactive) {
                        if (mySelections.has(slotId)) cell.classList.add('slot-selected');
                        cell.addEventListener('mousedown', (e) => startSelect(e, slotId));
                        cell.addEventListener('mouseover', () => handleMouseOver(slotId));
                    } else {
                        // 熱點圖邏輯
                        const data = heatmapData[slotId];
                        // 支援兩種格式：純數字(人數) 或 陣列(名單)
                        const count = Array.isArray(data) ? data.length : (parseInt(data) || 0);
                        const names = Array.isArray(data) ? data.join(', ') : `${count} 人有空`;

                        if (count > 0 && totalUsers > 0) {
                            const opacity = Math.max(0.1, count / totalUsers);
                            cell.style.setProperty('--opacity', opacity);
                            cell.classList.add('slot-other');
                            
                            const tooltip = document.createElement('span');
                            tooltip.className = 'tooltip';
                            tooltip.innerText = names;
                            cell.appendChild(tooltip);
                        }
                    }
                    container.appendChild(cell);
                });
            });
        }

        function createCell(text, className) {
            const el = document.createElement('div');
            el.className = `h-[32px] flex items-center justify-center border-bottom border-right ${className}`;
            el.style.borderBottom = "1px solid #e5e7eb";
            el.style.borderRight = "1px solid #e5e7eb";
            el.innerText = text;
            return el;
        }

        function startSelect(e, id) {
            isMouseDown = true;
            isAdding = !mySelections.has(id);
            toggleSelection(id, e.target);
            const upHandler = () => { isMouseDown = false; window.removeEventListener('mouseup', upHandler); };
            window.addEventListener('mouseup', upHandler);
        }

        function handleMouseOver(id) {
            if (!isMouseDown) return;
            const cell = document.querySelector(`#my-grid-container [data-id="${id}"]`);
            if (isAdding && !mySelections.has(id)) toggleSelection(id, cell);
            else if (!isAdding && mySelections.has(id)) toggleSelection(id, cell);
        }

        function toggleSelection(id, cell) {
            if (mySelections.has(id)) {
                mySelections.delete(id);
                cell.classList.remove('slot-selected');
            } else {
                mySelections.add(id);
                cell.classList.add('slot-selected');
            }
        }

        function clearSelections() {
            // 僅清空目前顯示週次的勾選
            weekDates.forEach(date => {
                HOURS.forEach(hour => {
                    const id = `${date}_${hour.toString().padStart(2, '0')}:00`;
                    mySelections.delete(id);
                });
            });
            renderGrid('my-grid-container', true);
        }
    </script>
</body>
</html>
